name: Backup Design Tokens

on:
  # 매일 오전 3시 (KST = UTC+9, 즉 UTC 18:00)에 자동 실행
  schedule:
    - cron: '0 18 * * *'
  # 어드민에서 테마 저장 시 수동 트리거 가능
  workflow_dispatch:
    inputs:
      reason:
        description: '백업 실행 이유 (선택)'
        required: false
        default: '수동 백업'

jobs:
  backup:
    name: Supabase Design Themes Backup
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create backup directory
        run: mkdir -p backups/design-tokens

      - name: Fetch and save design tokens from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;

          if (!SUPABASE_URL || !SUPABASE_KEY) {
            console.error('❌ SUPABASE_URL 또는 SUPABASE_SERVICE_ROLE_KEY 환경변수가 없습니다.');
            process.exit(1);
          }

          async function fetchAllThemes() {
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/design_themes?select=*&order=created_at.asc`,
              {
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Content-Type': 'application/json',
                },
              }
            );
            if (!res.ok) {
              throw new Error(`Supabase API 오류: ${res.status} ${res.statusText}`);
            }
            return res.json();
          }

          async function main() {
            console.log('🎨 디자인 토큰 백업 시작...');
            const themes = await fetchAllThemes();
            console.log(`✅ ${themes.length}개 테마 조회 완료`);

            const now = new Date();
            const timestamp = now.toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const dateStr = now.toISOString().slice(0, 10);

            // 1. 전체 스냅샷 (날짜별 이력)
            const snapshotDir = `backups/design-tokens/snapshots`;
            fs.mkdirSync(snapshotDir, { recursive: true });
            const snapshotPath = `${snapshotDir}/${timestamp}.json`;
            fs.writeFileSync(snapshotPath, JSON.stringify(themes, null, 2), 'utf-8');
            console.log(`📸 스냅샷 저장: ${snapshotPath}`);

            // 2. 최신 상태 (항상 덮어쓰기 - 빠른 복구용)
            const latestPath = `backups/design-tokens/latest.json`;
            fs.writeFileSync(latestPath, JSON.stringify(themes, null, 2), 'utf-8');
            console.log(`📄 최신 상태 저장: ${latestPath}`);

            // 3. 활성 테마만 별도 저장 (inject-design-tokens 스크립트 폴백용)
            const activeTheme = themes.find(t => t.is_active);
            if (activeTheme) {
              const activePath = `backups/design-tokens/active-theme.json`;
              fs.writeFileSync(activePath, JSON.stringify(activeTheme, null, 2), 'utf-8');
              console.log(`⭐ 활성 테마 저장: ${activePath} (${activeTheme.name})`);
            }

            // 4. 백업 메타데이터 업데이트
            const metaPath = `backups/design-tokens/backup-meta.json`;
            const meta = {
              last_backup: now.toISOString(),
              total_themes: themes.length,
              active_theme: activeTheme ? activeTheme.name : null,
              active_theme_id: activeTheme ? activeTheme.id : null,
              snapshot_file: snapshotPath,
            };
            fs.writeFileSync(metaPath, JSON.stringify(meta, null, 2), 'utf-8');
            console.log(`📋 메타데이터 업데이트: ${metaPath}`);

            // 5. 오래된 스냅샷 정리 (30일 이상 된 파일 삭제)
            const snapshots = fs.readdirSync(snapshotDir)
              .filter(f => f.endsWith('.json'))
              .sort();
            const cutoff = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
            let deleted = 0;
            for (const snap of snapshots) {
              const snapDate = new Date(snap.replace(/T(\d{2})-(\d{2})-(\d{2})/, 'T$1:$2:$3').replace(/-(\d{2}:\d{2}:\d{2})$/, ':$1'));
              if (snapDate < cutoff) {
                fs.unlinkSync(`${snapshotDir}/${snap}`);
                deleted++;
              }
            }
            if (deleted > 0) console.log(`🗑️  ${deleted}개 오래된 스냅샷 삭제 (30일 초과)`);

            console.log('✅ 백업 완료!');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

      - name: Check for changes
        id: check_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/design-tokens/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  변경사항 없음 - 커밋 생략"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 변경사항 감지 - 커밋 진행"
          fi

      - name: Commit and push backup
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          ACTIVE=$(cat backups/design-tokens/backup-meta.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).active_theme || 'unknown')")
          TOTAL=$(cat backups/design-tokens/backup-meta.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).total_themes)")
          git commit -m "chore: design token backup $(date -u '+%Y-%m-%d %H:%M UTC')

          - 활성 테마: ${ACTIVE}
          - 전체 테마 수: ${TOTAL}
          - 트리거: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reason || '스케줄 자동 백업' }}"
          git push

      - name: Skip commit (no changes)
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "✅ 디자인 토큰 변경 없음. 백업 커밋 생략."
